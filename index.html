                                                lines.shift(); // убираем заголовки

                                                return lines.map(line => {
                                                    // Более надёжный разбор CSV-строки (учитываем кавычки)
                                                    const cols = [];
                                                    let current = '';
                                                    let inQuotes = false;

                                                    for (let i = 0; i < line.length; i++) {
                                                        const char = line[i];
                                                        if (char === '"' && !inQuotes) {
                                                            inQuotes = true;
                                                        } else if (char === '"' && inQuotes) {
                                                            inQuotes = false;
                                                        } else if (char === ',' && !inQuotes) {
                                                            cols.push(current.trim());
                                                            current = '';
                                                        } else {
                                                            current += char;
                                                        }
                                                    }
                                                    // Последнее значение
                                                    cols.push(current.trim());

                                                    const name = (cols[1] || '').trim();
                                                    const city = (cols[2] || '').trim();
                                                    const logo = (cols[3] || '').trim();
                                                    const vk = (cols[4] || '').trim();
                                                    const youtube = (cols[5] || '').trim();
                                                    const website = (cols[6] || '').trim();
                                                    const rutube = (cols[7] || '').trim();
                                                    const telegram = (cols[8] || '').trim();
                                                    let aliasesRaw = (cols[9] || '').trim();

                                                    const entry = { name, city, logo, vk, youtube, website, rutube, telegram };

                                                    // Очищаем синонимы от кавычек и лишних пробелов
                                                    if (aliasesRaw) {
                                                        // Убираем внешние кавычки, если они есть вокруг всего столбца
                                                        aliasesRaw = aliasesRaw.replace(/^"+|"+$/g, '').trim();

                                                        // Разделяем по запятым и очищаем каждую часть
                                                        aliasesRaw.split(',').forEach(part => {
                                                            let clean = part
                                                                .trim()
                                                                .replace(/^"+|"+$/g, '')   // убираем кавычки в начале и конце каждого элемента
                                                                .replace(/\s+/g, ' ')      // нормализуем пробелы
                                                                .trim();

                                                            if (clean) {
                                                                synonymToOfficial.set(clean.toLowerCase(), name);
                                                            }
                                                        });
                                                    }

                                                    // Само название тоже добавляем как возможный поисковый вариант
                                                    if (name) {
                                                        synonymToOfficial.set(name.toLowerCase(), name);
                                                    }

                                                    return entry;
                                                });
                                            }

                                            function renderManufacturers(list) {
                                                const grid = document.getElementById('manufacturer-grid');
                                                if (!grid) return;
                                                grid.innerHTML = '';

                                                list.forEach(m => {
                                                    const card = document.createElement('div');
                                                    card.className = 'manufacturer-card';
                                                    card.id = `manuf-${m.name.toLowerCase().replace(/[^a-zа-яё0-9]/gi, '-')}`;
                                                    card.style.cursor = 'pointer';
                                                    card.onclick = (e) => {
                                                        const url = `/manufacturer.html?name=${encodeURIComponent(m.name)}`;
                                                        if (e.ctrlKey || e.metaKey) {
                                                            // Ctrl/Cmd + клик = новая вкладка
                                                            window.open(url, '_blank');
                                                        } else {
                                                            // Обычный клик = текущая вкладка
                                                            window.location.href = url;
                                                        }
                                                    };

                                                    // Логотип
                                                    const logoWrap = document.createElement('div');
                                                    logoWrap.className = 'manufacturer-logo-container';
                                                    const img = document.createElement('img');
                                                    img.className = 'manufacturer-logo';
                                                    img.src = m.logo || '';
                                                    img.alt = m.name;
                                                    img.onerror = () => img.src = 'https://placehold.co/200x200?text=нет+лого';
                                                    logoWrap.appendChild(img);

                                                    // Название
                                                    const nameEl = document.createElement('div');
                                                    nameEl.className = 'manufacturer-name';
                                                    nameEl.textContent = m.name;

                                                    // Город
                                                    const cityEl = document.createElement('div');
                                                    cityEl.className = 'manufacturer-city';
                                                    cityEl.textContent = m.city || '—';

                                                    // Соцсети
                                                    const socials = document.createElement('div');
                                                    socials.className = 'manufacturer-socials';

                                                    const add = (url, icon) => {
                                                        if (!url) return;
                                                        const a = document.createElement('a');
                                                        a.href = url; a.target = '_blank';
                                                        a.onclick = (e) => e.stopPropagation();
                                                        const i = document.createElement('img');
                                                        i.src = icon;
                                                        a.appendChild(i);
                                                        socials.appendChild(a);
                                                    };

                                                    add(m.website, ICON_WEB);
                                                    add(m.vk, ICON_VK);
                                                    add(m.youtube, ICON_YT);
                                                    add(m.rutube, ICON_RUTUBE);
                                                    add(m.telegram, ICON_TG);

                                                    card.append(logoWrap, nameEl, cityEl, socials);
                                                    grid.appendChild(card);
                                                });
                                            }
                                            function fillDatalist() {
                                                const datalist = document.getElementById('manufacturer-suggestions');
                                                if (!datalist) return;
                                                datalist.innerHTML = '';

                                                const officialSet = new Set();
                                                synonymToOfficial.forEach(official => officialSet.add(official));

                                                [...officialSet].sort().forEach(name => {
                                                    const opt = document.createElement('option');
                                                    opt.value = name;
                                                    datalist.appendChild(opt);
                                                });
                                            }

                                            function findAndScroll() {
                                                const input = document.getElementById('manufacturer-search');
                                                if (!input) return;

                                                const val = input.value.trim();
                                                if (!val) return;

                                                const lower = val.toLowerCase();
                                                const officialName = synonymToOfficial.get(lower);

                                                if (officialName) {
                                                    // ← Вот это главное изменение
                                                    input.value = officialName;  // подставляем официальное название в поле

                                                    const id = `manuf-${officialName.toLowerCase().replace(/[^a-zа-яё0-9]/gi, '-')}`;
                                                    const card = document.getElementById(id);

                                                    if (card) {
                                                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                                        // Подсветка карточки
                                                        card.style.transition = 'background 1.2s';
                                                        card.style.background = 'rgba(171, 71, 188, 0.6)';
                                                        setTimeout(() => { card.style.background = ''; }, 1600);
                                                    } else {
                                                        console.warn('Карточка не найдена по id:', id);
                                                    }
                                                }
                                            }
                                            // Загрузка
                                            fetch(SHEET_CSV_URL)
                                                .then(r => r.text())
                                                .then(csv => {
                                                    manufacturers = parseCSV(csv);
                                                    renderManufacturers(manufacturers);
                                                    fillDatalist();

                                                    const input = document.getElementById('manufacturer-search');
                                                    if (input) {
                                                        // Срабатывает при выборе из списка или нажатии Enter
                                                        input.addEventListener('change', findAndScroll);
                                                        input.addEventListener('keypress', e => {
                                                            if (e.key === 'Enter') {
                                                                e.preventDefault();
                                                                findAndScroll();
                                                            }
                                                        });

                                                        input.addEventListener('input', function () {
                                                            // Берём то, что ввёл пользователь
                                                            let typed = this.value.trim();

                                                            // Если ничего не ввели — показываем все
                                                            if (!typed) {
                                                                fillDatalist();
                                                                return;
                                                            }

                                                            // Приводим к нижнему регистру ОДИН РАЗ
                                                            typed = typed.toLowerCase();

                                                            const datalist = document.getElementById('manufacturer-suggestions');
                                                            if (!datalist) return;

                                                            datalist.innerHTML = '';

                                                            const found = new Set();

                                                            // Проходим по всем синонимам
                                                            synonymToOfficial.forEach(function (official, key) {
                                                                // key уже в нижнем регистре (из parseCSV)
                                                                if (key.startsWith(typed)) {
                                                                    found.add(official);
                                                                }
                                                            });

                                                            // Если ничего не нашли — можно показать хотя бы похожие (опционально)
                                                            if (found.size === 0 && typed.length >= 2) {
                                                                synonymToOfficial.forEach(function (official, key) {
                                                                    if (key.includes(typed)) {
                                                                        found.add(official);
                                                                    }
                                                                });
                                                            }

                                                            // Заполняем datalist
                                                            [...found]
                                                                .sort()
                                                                .forEach(name => {
                                                                    const option = document.createElement('option');
                                                                    option.value = name;
                                                                    datalist.appendChild(option);
                                                                });
                                                        });
                                                    }
                                                })
                                                .catch(err => console.error('Ошибка загрузки производителей:', err));
                                        })();
                                    </script>

                        lBox.addEventListener('touchend', (e) => {
                            constrainPan();
                            lImg.style.transform = `translate(${panX}px, ${panY}px) scale(${currentScale})`;

                            if (e.changedTouches.length === 1 && !isPanning && currentScale === 1) {
                                lTouchEndX = e.changedTouches[0].clientX;
                                if (Math.abs(lTouchStartX - lTouchEndX) > 50) {
                                    lWrapper.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                                    if (lTouchStartX - lTouchEndX > 50) {
                                        lWrapper.style.transform = 'translateX(-50px)'; lWrapper.style.opacity = '0';
                                        setTimeout(() => { galleryNext(); lImg.src = currentPhotos[currentPhotoIndex]; lWrapper.style.transform = 'translateX(50px)'; setTimeout(() => { lWrapper.style.transform = 'translateX(0)'; lWrapper.style.opacity = '1'; panX = 0; panY = 0; currentScale = 1; lImg.style.transform = 'translate(0px, 0px) scale(1)'; }, 50); }, 200);
                                    }
                                    if (lTouchEndX - lTouchStartX > 50) {
                                        lWrapper.style.transform = 'translateX(50px)'; lWrapper.style.opacity = '0';
                                        setTimeout(() => { galleryPrev(); lImg.src = currentPhotos[currentPhotoIndex]; lWrapper.style.transform = 'translateX(-50px)'; setTimeout(() => { lWrapper.style.transform = 'translateX(0)'; lWrapper.style.opacity = '1'; panX = 0; panY = 0; currentScale = 1; lImg.style.transform = 'translate(0px, 0px) scale(1)'; }, 50); }, 200);
                                    }
                                }
                            }
                            isPanning = false;
                        }, { passive: false });
                        function shareCurrentAd() {
                            if (!currentAd) return;
                            const url = window.location.origin + window.location.pathname + '?id=' + currentAd.rowIndex;
                            const text = `Смотри вездеход: ${currentAd.title}\nЦена: ${Number(currentAd.price).toLocaleString()} ₽\n${url}`;
                            if (navigator.share) { navigator.share({ title: currentAd.title, text: text, url: url }).catch((e) => console.log(e)); }
                            else { const t = document.createElement("textarea"); t.value = text; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t); alert("Ссылка скопирована!"); }
                        }
                        function closeModal(e) { if (e.target.id === 'modal') closeModalDirect() }
                        function closeModalDirect() { document.getElementById('modal').classList.remove('active'); document.body.style.overflow = 'auto'; }
                        function updateAuthUI(user) {
                            const btnLogin = document.getElementById('btn-login');
                            const btnLogout = document.getElementById('btn-logout');
                            const btnAdd = document.getElementById('btn-add-ad');
                            const authInfo = document.getElementById('auth-info');
                            const adminTab = document.getElementById('admin-tab-link');

                            isAdmin = false;
                            adminTab.classList.add('hidden');

                            if (user) {
                                btnLogin.classList.add('hidden');
                                btnLogout.classList.remove('hidden');
                                btnAdd.classList.remove('hidden');

                                let displayPhone = user.phoneNumber || user.email || "Пользователь";
                                authInfo.innerText = displayPhone;

                                let uPhone = String(user.phoneNumber || "").replace(/\D/g, '');
                                let aPhone = String(ADMIN_PHONE).replace(/\D/g, '');

                                if (uPhone === aPhone) {
                                    isAdmin = true;
                                    adminTab.classList.remove('hidden');
                                    if (typeof allAds !== 'undefined') {
                                        let pCount = allAds.filter(a => (a.status || '').toLowerCase().trim() === 'pending').length;
                                        adminTab.innerText = `Админка (${pCount})`;
                                    } else { adminTab.innerText = `Админка`; }
                                }
                            } else {
                                btnLogin.classList.remove('hidden');
                                btnLogout.classList.add('hidden');
                                btnAdd.classList.add('hidden');
                                authInfo.innerText = "Гость";
                            }
                        }
                        document.getElementById('main-form').addEventListener('submit', async (e) => {
                            e.preventDefault();
                            if (!currentUser) return alert("Войдите!");
                            showLoader("Публикация...");
                            try {
                                let phU = (currentAd && isEditMode) ? currentAd.photos : "", fI = document.getElementById('inp-photos');
                                if (fI.files.length > 0) {
                                    let arr = [];
                                    for (let i = 0; i < Math.min(fI.files.length, 10); i++) {
                                        let fd = new FormData(); fd.append('file', fI.files[i]); fd.append('upload_preset', UPLOAD_PRESET);
                                        let r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
                                        let j = await r.json(); if (j.secure_url) arr.push(j.secure_url);
                                    }
                                    phU = arr.join(',');
                                }
                                const cond = safeVal('inp-condition');
                                let desc = safeVal('inp-desc');
                                if (cond === 'new') desc += NEW_STATUS_TAG;

                                const priceVal = getPriceValue('inp-price');

                                const brand = safeVal('inp-brand');
                                const model = safeVal('inp-model');
                                const title = [brand, model].filter(Boolean).join(' ').trim();

                                const pl = {
                                    action: isEditMode ? 'edit' : 'create',
                                    rowIndex: safeVal('edit-row-index'),
                                    title: title,
                                    brand: brand,
                                    model: model,
                                    price: priceVal,
                                    desc: desc,
                                    name: safeVal('inp-name'),
                                    phone: currentUser.phoneNumber,
                                    photos: phU,
                                    engine: safeVal('inp-engine'),
                                    power: safeVal('inp-power'),
                                    transmission: safeVal('inp-trans'),
                                    fuel: safeVal('inp-fuel'),
                                    wheels: (safeVal('tire-d') && safeVal('tire-w')) ? `${safeVal('tire-d')}x${safeVal('tire-w')}` : "",
                                    region: "",
                                    city: safeVal('inp-city'),
                                    condition: cond,
                                    sellerType: safeVal('inp-seller-type'),
                                    tender: safeVal('inp-tender'),
                                    wheelFormula: safeVal('inp-wheel-f'),
                                    color: safeVal('inp-color'),
                                    mileage: safeVal('inp-mileage'),
                                    amphibious: safeVal('inp-amphibious'),
                                    docs: safeVal('inp-docs'),
                                    techType: safeVal('inp-tech-type'),
                                    constructionType: safeVal('inp-construction'),
                                    capacity: safeVal('inp-capacity')
                                };
                                const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(pl) });
                                const json = await response.json();
                                if (json.status !== 'success') {
                                    throw new Error(json.message || 'Ошибка операции');
                                }
                                document.getElementById('main-form').reset();
                                document.getElementById('preview-container').innerHTML = '';
                                document.getElementById('file-count').innerText = '';
                                showList(); loadAds();
                            } catch (er) { alert(er.message); hideLoader(); } finally { hideLoader() }
                        });
                        async function loadAds() {
                            try {
                                const r = await fetch(GOOGLE_SCRIPT_URL + '?t=' + new Date().getTime());
                                const raw = await r.json();

                                // Преобразуем записи: если есть Brand и Model, комбинируем их в title
                                allAds = (Array.isArray(raw) ? raw : []).map(ad => {
                                    const brand = String(ad.brand || ad.Brand || ad.Бренд || ad.BrandName || '').trim();
                                    const model = String(ad.model || ad.Model || ad.Модель || ad.ModelName || '').trim();
                                    const combined = [brand, model].filter(Boolean).join(' ').trim();
                                    if (combined) ad.title = combined;
                                    // Гарантируем, что поле title существует
                                    if (typeof ad.title === 'undefined' || ad.title === null) ad.title = '';
                                    return ad;
                                });

                                applyFilters();

                                const urlParams = new URLSearchParams(window.location.search);
                                const adId = urlParams.get('id');
                                if (adId) {
                                    const found = allAds.find(a => String(a.rowIndex) === String(adId));
                                    if (found && found.status === 'approved') {
                                        openAd(found);
                                    }
                                }

                                if (typeof currentUser !== 'undefined' && currentUser) updateAuthUI(currentUser);

                                ptrIndicator.style.opacity = '0';
                            } catch (e) {
                                console.log(e)
                            } finally {
                                document.getElementById('loading-ads').style.display = 'none';
                                hideLoader();
                                ptrIndicator.style.opacity = '0';
                            }
                        }
                        function showLoader(t) { document.getElementById('loader-text').innerText = t; document.getElementById('global-loader').style.opacity = '1'; document.getElementById('global-loader').style.pointerEvents = 'all'; }
                        function hideLoader() { document.getElementById('global-loader').style.opacity = '0'; document.getElementById('global-loader').style.pointerEvents = 'none'; ptrIndicator.style.opacity = '0'; }
                        function openCreateMode() {
                            isEditMode = false;
                            document.getElementById('form-title').innerText = "Новое объявление";
                            document.getElementById('submit-btn').innerText = "Отправить на модерацию";
                            document.getElementById('tabs-nav').style.display = 'none'; // Hide tabs nav
                            document.getElementById('tabs-container').style.display = 'none'; // Hide tabs content
                            document.getElementById('view-form').classList.remove('hidden'); // Show form
                            document.getElementById('main-form').reset();
                            document.getElementById('preview-container').innerHTML = '';
                            document.getElementById('file-count').innerText = '';
                            checkTechTypeVisibility();
                            checkConditionVisibility();
                        }
                        function showList() {
                            document.getElementById('view-form').classList.add('hidden'); // Hide form
                            document.getElementById('tabs-nav').style.display = 'flex'; // Show tabs nav
                            document.getElementById('tabs-container').style.display = 'block'; // Show tabs content
                            // When returning to list, always show the 'ads' tab
                            showTab(document.querySelector('.tab-link[onclick*="ads"]'), 'ads');
                        }
                        function editCurrentAd() { closeModalDirect(); openEditMode(currentAd) }
                        function deleteCurrentAd() { if (confirm("Удалить?")) { closeModalDirect(); sendDelete(parseInt(currentAd.rowIndex), currentAd.phone); } }
                        async function sendDelete(r, p) { showLoader("Удаление..."); try { const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', rowIndex: r, phone: p }) }); const json = await response.json(); if (json.status !== 'success') { throw new Error(json.message || 'Ошибка удаления'); } await loadAds(); } catch (e) { alert(e.message); hideLoader(); } finally { hideLoader() } }
                        function openEditMode(ad) {
                            isEditMode = true;
                            document.getElementById('form-title').innerText = "Редактирование";
                            document.getElementById('submit-btn').innerText = "Сохранить";
                            setVal('edit-row-index', ad.rowIndex);
                            setVal('inp-brand', ad.brand || "");
                            setVal('inp-model', ad.model || "");
                            setVal('inp-price', Number(ad.price || 0).toLocaleString('ru-RU').replace(/,/g, ' '));
                            setVal('inp-desc', (ad.desc || "").replace(NEW_STATUS_TAG, "").trim());
                            setVal('inp-name', ad.name);
                            setVal('inp-engine', ad.engine);
                            setVal('inp-power', ad.power);
                            setVal('inp-trans', ad.transmission);
                            setVal('inp-fuel', ad.fuel);
                            setVal('inp-city', ad.city);
                            setVal('inp-condition', checkIsNew(ad) ? 'new' : 'used');
                            checkConditionVisibility();
                            setVal('inp-mileage', ad.mileage || "");
                            setVal('inp-wheel-f', ad.wheelFormula);
                            setVal('inp-color', ad.color);
                            if (ad.wheels) { const p = ad.wheels.split('x'); if (p.length >= 2) { setVal('tire-d', p[0]); setVal('tire-w', p[1]) } }
                            setVal('inp-seller-type', ad.sellerType || "");
                            checkTenderVisibility();
                            setVal('inp-tender', ad.tender || "no");
                            setVal('inp-amphibious', ad.amphibious || "no");
                            setVal('inp-docs', ad.docs || "");
                            setVal('inp-tech-type', ad.techType || "vezdehod");
                            setVal('inp-construction', ad.constructionType || "");
                            setVal('inp-capacity', ad.capacity || "");
                            checkTechTypeVisibility();
                            document.getElementById('preview-container').innerHTML = '';
                            document.getElementById('file-count').innerText = '';
                            document.getElementById('tabs-nav').style.display = 'none'; // Hide tabs nav
                            document.getElementById('tabs-container').style.display = 'none'; // Hide tabs content
                            document.getElementById('view-form').classList.remove('hidden'); // Show form
                        }

                        // --- NEW ADMIN FUNCTIONS ---
                        function renderModerationGrid(ads) {
                            const container = document.getElementById('moderation-grid');
                            const placeholder = document.getElementById('moderation-placeholder');
                            container.innerHTML = '';

                            if (ads.length === 0) {
                                placeholder.style.display = 'block';
                                return;
                            }

                            placeholder.style.display = 'none';

                            ads.forEach(ad => {
                                let firstPhoto = ad.photos ? ad.photos.split(',')[0] : 'https://placehold.co/400?text=Нет+фото';
                                if (firstPhoto && !firstPhoto.startsWith('http')) firstPhoto = 'https://placehold.co/400?text=Нет+фото';

                                const card = document.createElement('div');
                                card.className = 'moderation-card';
                                card.innerHTML = `
            <img src="${firstPhoto}" class="moderation-card-img" /> <div class="moderation-card-info"> <div class="moderation-card-title">${ad.title || 'Без названия'}</div> <div class="moderation-card-price">${Number(ad.price || 0).toLocaleString()} ₽</div> </div> <div class="moderation-card-actions"> <button class="btn btn-black" onclick="openAd(allAds.find(a=>String(a.rowIndex)===String(${ad.rowIndex})))" style="height:36px; line-height:36px; font-size:13px; margin-bottom:5px;">Посмотреть</button> <button class="btn btn-approve" onclick="approveAd(${ad.rowIndex})">Одобрить</button> <button class="btn btn-reject" onclick="rejectAd(${ad.rowIndex})">Отклонить</button> </div>
        `;
                                container.appendChild(card);
                            });
                        }

                        async function approveAd(rowIndex) {
                            if (!isAdmin || !currentUser) return;
                            showLoader('Одобряю...');
                            try {
                                const payload = { action: 'approve', rowIndex: rowIndex, phone: currentUser.phoneNumber };
                                const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                                const result = await response.json();
                                if (result.status !== 'success') throw new Error(result.message || 'Ошибка одобрения');
                                await loadAds(); // Reload all data
                            } catch (e) {
                                alert('Ошибка: ' + e.message);
                            } finally {
                                hideLoader();
                            }
                        }

                        async function rejectAd(rowIndex) {
                            if (!isAdmin || !currentUser) return;
                            if (!confirm('Вы уверены, что хотите отклонить (удалить) это объявление?')) return;
                            showLoader('Отклоняю...');
                            try {
                                const payload = { action: 'reject', rowIndex: rowIndex, phone: currentUser.phoneNumber };
                                const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                                const result = await response.json();
                                if (result.status !== 'success') throw new Error(result.message || 'Ошибка отклонения');
                                await loadAds(); // Reload all data
                            } catch (e) {
                                alert('Ошибка: ' + e.message);
                            } finally {
                                hideLoader();
                            }
                        }

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Страница не найдена — купитьвездеход.рф</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="/images/logo.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #F7F9F8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 480px;
        }
        .code {
            font-size: 120px;
            font-weight: 700;
            color: #E0E0E0;
            line-height: 1;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin: 16px 0 8px;
        }
        .desc {
            font-size: 16px;
            color: #777;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #0066cc;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn:hover { background: #0052a3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <div class="title">Страница не найдена</div>
        <div class="desc">Такой страницы нет или она была удалена</div>
        <a href="/" class="btn">На главную</a>
    </div>
</body>
</html>
